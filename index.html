<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karachi Nimko Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff8c00;
            --primary-hover: #e07b00;
            --bg-color: #121212;
            --chat-bg: #1e1e1e;
            --text-main: #fdfdfd;
            --text-muted: #9e9e9e;
            --user-msg-bg: #ff8c00;
            --user-msg-text: #ffffff;
            --bot-msg-bg: #2d2d2d;
            --bot-msg-text: #eaeaea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image:
                radial-gradient(circle at top right, rgba(255, 140, 0, 0.15), transparent 40%),
                radial-gradient(circle at bottom left, rgba(255, 80, 0, 0.1), transparent 40%);
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            background-color: var(--chat-bg);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 140, 0, 0.15);
        }

        .chat-header {
            padding: 24px 20px;
            background: linear-gradient(to bottom, rgba(30, 30, 30, 0.95), rgba(30, 30, 30, 0.85));
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .chat-header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--primary-color);
        }

        .chat-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 24px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 82%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: var(--user-msg-text);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.2);
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            color: var(--bot-msg-text);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 18px 20px;
            background: var(--chat-bg);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            flex-grow: 1;
            background-color: #2a2a2a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 22px;
            border-radius: 30px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.15);
            background-color: #303030;
        }

        input[type="text"]::placeholder {
            color: #777;
        }

        button {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            background-color: var(--primary-hover);
        }

        button svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            margin-left: 2px;
            /* optical alignment for send arrow */
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            padding: 16px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Initial Greeting Style */
        .greeting-msg {
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <h1>Karachi Nimko Chatkharay Achaar</h1>
            <p>Digital Order Assistant</p>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chat-messages">
            <div class="greeting-msg">Chat with our bot for your orders today!</div>

            <div class="message bot">Assalam-o-Alaikum! Khushamdeed! Main Karachi Nimko Chatkharay Achar ka assistant
                hoon. Main aapki kya madad kar sakta hoon?</div>

            <!-- Typing Indicator (Hidden by default) -->
            <div class="typing-indicator" id="typing">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
            <button id="send-btn" aria-label="Send Message">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Store conversation history dynamically
        let chatHistory = [];

        const msgsContainer = document.getElementById('chat-messages');
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            msgsContainer.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            msgsContainer.scrollTo({
                top: msgsContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // 1. Show user message
            addMessage(text, 'user');
            inputField.value = '';

            // 2. Show typing indicator
            typingIndicator.style.display = 'block';
            scrollToBottom();

            // 3. Construct payload to send to FastAPI backend
            const payload = {
                user_input: text,
                history: chatHistory
            };

            try {
                // Point this to your backend server port (default fastapi is 8000)
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                let botReply = data.bot_says || "System Error: No response received.";

                // Hide typing immediately
                typingIndicator.style.display = 'none';

                // Intercept the hidden cart command
                const cartCommandRegex = /<cart_command>([\s\S]*?)<\/cart_command>/i;
                const match = botReply.match(cartCommandRegex);

                if (match) {
                    try {
                        const commandData = JSON.parse(match[1]);
                        console.log("Cart Event Triggered!", commandData);
                        alert("AUTOMATED CART ADD: The bot has executed the add_to_cart function!\n" + JSON.stringify(commandData.items, null, 2));

                        // NOTE: When deployed to Shopify, the real code will be:
                        // fetch('/cart/add.js', { method: 'POST', ... })

                        // Remove the hidden JSON tag from the visual chat
                        botReply = botReply.replace(cartCommandRegex, '').trim();
                    } catch (err) {
                        console.error("Mishandled JSON from bot:", err);
                    }
                }

                // Show bot message
                if (botReply) {
                    addMessage(botReply, 'bot');
                }

                // Keep history updated so AI Remembers context
                chatHistory.push({ role: 'user', content: text });
                chatHistory.push({ role: 'assistant', content: data.bot_says });

            } catch (e) {
                typingIndicator.style.display = 'none';
                addMessage('Connection error. Please make sure the terminal server (FastAPI) is running.', 'bot');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>

</html>
